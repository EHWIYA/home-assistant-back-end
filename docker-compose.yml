# NAS: /home/iwh/iot/api/docker-compose.yml (경로는 서버 배치에 맞게)
# 프로젝트명: COMPOSE_PROJECT_NAME=iot-api 또는 docker compose -p iot-api (디렉터리명 api만 쓰면 기본 project api)
# .env (서버 관리, 커밋 금지):
#   HA_BASE_URL=http://127.0.0.1:8123
#   HOST=0.0.0.0
#   PORT=8002
# HA가 host network이면 iot-api도 host network 권장 (bridge→8123 UFW 차단 이슈 회피)
services:
  iot-api:
    image: ghcr.io/ehwiya/home-assistant-back-end:latest
    container_name: iot-api
    restart: unless-stopped
    network_mode: host
    env_file: .env
    # host network: ports/extra_hosts 불필요. nginx → 127.0.0.1:8002
