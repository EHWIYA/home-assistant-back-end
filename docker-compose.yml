# NAS: /home/iwh/iot/api/docker-compose.yml
# .env: HA_BASE_URL=http://host.docker.internal:8123 (서버에서 관리, 커밋 금지)
services:
  iot-api:
    image: ghcr.io/ehwiya/home-assistant-back-end:latest
    container_name: iot-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8002:8002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
