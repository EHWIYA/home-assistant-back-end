# =============================================================================
# iot-api 배포 workflow
#
# 트리거: main push, workflow_dispatch
#
# 흐름
#   1) build-and-push — Docker build → GHCR push
#   2) deploy-nas     — Tailscale join → SSH → /home/iwh/iot/api → compose pull/up
#
# Secrets (deploy-nas)
#   TS_AUTH_KEY, NAS_HOST, NAS_SSH_USER, NAS_SSH_KEY
#
# 주의: hosted runner는 tailnet 밖 → SSH 전 Tailscale 필수 (없으면 :22 timeout)
# NAS .env 는 서버 관리 (GHA 미갱신)
# =============================================================================

name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NAS_APP_DIR: /home/iwh/iot/api

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — GHCR 이미지 빌드·push
  # ---------------------------------------------------------------------------
  build-and-push:
    name: GHCR build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------------------------
  # Job 2 — NAS 배포 (Tailscale → SSH)
  #
  # Secrets
  #   TS_AUTH_KEY   — Reusable + Ephemeral auth key (~90일, 만료 전 갱신)
  #   NAS_HOST      — 100.88.40.125 (Tailscale IP)
  #   NAS_SSH_USER  — iwh
  #   NAS_SSH_KEY   — github_actions_deploy private key
  # ---------------------------------------------------------------------------
  deploy-nas:
    name: NAS docker compose deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Tailscale connect
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}

      - name: SSH pull up and health
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_SSH_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            cd ${{ env.NAS_APP_DIR }}
            docker compose pull
            docker compose up -d
            # 컨테이너 기동 직후 curl(56) 방지 — 재시도. NAS .env HOST 는 0.0.0.0 권장
            ok=0
            for i in $(seq 1 15); do
              if curl -sf --connect-timeout 3 --max-time 10 http://127.0.0.1:8002/health; then
                ok=1
                break
              fi
              sleep 2
            done
            if [ "$ok" -ne 1 ]; then
              echo "health check failed after compose up"
              docker compose ps
              docker compose logs --tail 80 iot-api
              exit 1
            fi
            echo ""
            echo "health OK"
