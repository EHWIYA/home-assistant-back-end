# =============================================================================
# iot-api 배포 workflow
#
# 트리거: main push, workflow_dispatch
#
# 흐름
#   0) test            — pytest (ci.yml 과 동일 게이트)
#   1) build-and-push  — Docker build → GHCR (:sha-XXXXXXX + :latest)
#   2) deploy-nas      — Tailscale → SSH → pin IOT_API_IMAGE → compose pull/up
#
# 롤백: .github/DEPLOY_RUNBOOK.md
# =============================================================================

name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NAS_APP_DIR: /home/iwh/iot/api
  COMPOSE_PROJECT_NAME: iot-api

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pytest -q

  build-and-push:
    name: GHCR build and push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set deploy image ref
        id: image
        run: |
          short="${GITHUB_SHA::7}"
          echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${short}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-nas:
    name: NAS docker compose deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Tailscale connect
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}

      - name: SSH pull up and health
        uses: appleboy/ssh-action@v1.2.0
        env:
          IOT_API_IMAGE: ${{ needs.build-and-push.outputs.image_ref }}
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_SSH_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          script_stop: true
          envs: IOT_API_IMAGE
          script: |
            set -e
            export COMPOSE_PROJECT_NAME=${{ env.COMPOSE_PROJECT_NAME }}
            cd ${{ env.NAS_APP_DIR }}
            echo "Deploying ${IOT_API_IMAGE}"
            echo "${IOT_API_IMAGE}" > .deploy-image
            echo "$(date -Iseconds) ${IOT_API_IMAGE}" >> .deploy-history.log
            export IOT_API_IMAGE
            docker compose pull
            docker compose up -d
            ok=0
            for i in $(seq 1 15); do
              if curl -sf --connect-timeout 3 --max-time 10 http://127.0.0.1:8002/health; then
                ok=1
                break
              fi
              sleep 2
            done
            if [ "$ok" -ne 1 ]; then
              echo "health check failed after compose up"
              docker compose ps
              docker compose logs --tail 80 iot-api
              exit 1
            fi
            echo ""
            echo "health OK — image ${IOT_API_IMAGE}"
