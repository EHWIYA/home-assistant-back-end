version: 2
updates:
  # 최초 활성화 시 PR 폭주 방지 — 주 1회·그룹 1개·동시 PR 2건 상한
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    groups:
      actions:
        patterns:
          - "*"
